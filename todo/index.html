<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="シンプルで使いやすいTo-Doリスト管理アプリケーション。ローカルストレージで自動保存。">
    <title>To-Do リスト | タスク管理アプリ</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <!-- ヘッダー -->
        <header class="header">
            <h1 class="title">📝 My To-Do List</h1>
            <p class="subtitle">シンプルなタスク管理</p>
        </header>

        <!-- メインコンテンツ -->
        <main class="main-content">
            <!-- 入力エリア -->
            <section class="input-section">
                <form id="todoForm" class="input-form">
                    <input 
                        type="text" 
                        id="todoInput" 
                        class="input-field" 
                        placeholder="新しいタスクを入力してください..."
                        autocomplete="off"
                    >
                    <button type="submit" class="btn btn-add">追加</button>
                </form>
                <div class="input-info">
                    <small>Enterキーでも追加できます</small>
                </div>
            </section>

            <!-- フィルターボタン -->
            <section class="filter-section">
                <div class="filter-buttons">
                    <button class="filter-btn active" data-filter="all">すべて</button>
                    <button class="filter-btn" data-filter="active">未完了</button>
                    <button class="filter-btn" data-filter="completed">完了済み</button>
                </div>
                <button id="clearCompleted" class="btn btn-danger">完了済みを削除</button>
            </section>

            <!-- 統計情報 -->
            <section class="stats-section">
                <div class="stat-item">
                    <span class="stat-label">総タスク数</span>
                    <span class="stat-value" id="totalTasks">0</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">未完了</span>
                    <span class="stat-value" id="activeTasks">0</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">完了済み</span>
                    <span class="stat-value" id="completedTasks">0</span>
                </div>
            </section>

            <!-- タスクリスト -->
            <section class="tasks-section">
                <ul id="todoList" class="todo-list">
                    <!-- JavaScriptで動的に生成 -->
                </ul>
                <div id="emptyState" class="empty-state">
                    <p>🎉 タスクがありません！</p>
                    <p>新しいタスクを追加してみましょう</p>
                </div>
            </section>
        </main>

        <!-- フッター -->
        <footer class="footer">
            <small>&copy; 2026 To-Do List App | <a href="../index.html">ホームに戻る</a></small>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
